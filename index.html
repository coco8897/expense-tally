<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tally</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f0a;
      color: #e8f5e9;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* HEADER */
    .header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid #1a2a1a;
      position: sticky;
      top: 0;
      background: #0a0f0a;
      z-index: 10;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #4ade80;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .total {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      color: #fff;
      line-height: 1;
    }

    .total span.currency {
      font-size: 16px;
      font-weight: 400;
      color: #4ade80;
      margin-left: 6px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .meta .count { color: #555; font-size: 12px; }

    .sync {
      font-size: 11px;
      font-weight: 600;
    }
    .sync.saved { color: #4ade80; }
    .sync.syncing { color: #f59e0b; }
    .sync.error { color: #ef4444; }

    .btn-clear {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: #ef4444;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0.7;
      display: none;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-top: 16px;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tab.active { background: #4ade80; color: #0a0f0a; }
    .tab.inactive { background: #111a11; color: #4ade80; }

    /* ADD EXPENSE */
    .add-btn-wrap { padding: 12px 16px 0; }

    .btn-add-trigger {
      width: 100%;
      padding: 14px;
      background: #0f1f0f;
      border: 1.5px dashed #2a4a2a;
      border-radius: 14px;
      color: #4ade80;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .add-panel {
      margin: 16px;
      background: #0f1f0f;
      border: 1px solid #1a3a1a;
      border-radius: 16px;
      padding: 20px;
      display: none;
    }

    .add-panel.open { display: block; }

    .add-panel .panel-title {
      font-size: 13px;
      color: #4ade80;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .input-field {
      width: 100%;
      background: #060f06;
      border: 1px solid #1a2a1a;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8f5e9;
      font-size: 15px;
      margin-bottom: 10px;
      outline: none;
      font-family: inherit;
    }

    .amount-wrap { position: relative; margin-bottom: 14px; }

    .amount-wrap .currency-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #4ade80;
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
    }

    .input-amount {
      width: 100%;
      background: #060f06;
      border: 1px solid #1a2a1a;
      border-radius: 10px;
      padding: 12px 14px 12px 52px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      outline: none;
      font-variant-numeric: tabular-nums;
      font-family: inherit;
    }

    .cats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .cat-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
      background: #111a11;
      color: #aaa;
      transition: all 0.15s;
    }

    .cat-btn.selected { font-weight: 700; }

    .panel-actions { display: flex; gap: 8px; }

    .btn-confirm {
      flex: 1;
      background: #4ade80;
      color: #0a0f0a;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: inherit;
    }

    .btn-cancel {
      padding: 13px 18px;
      background: #111a11;
      color: #aaa;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }

    /* LOG */
    .log { padding: 10px 0; }

    .empty {
      text-align: center;
      color: #2a3a2a;
      padding: 60px 20px;
    }

    .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .day-header {
      padding: 12px 20px 6px;
      font-size: 11px;
      color: #4ade80;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .day-header .day-total { color: #2a4a2a; margin-left: 8px; }

    .entry {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid #0d1a0d;
      transition: background 0.2s;
    }

    .entry.confirm-delete { background: #1a0a0a; }

    .entry-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .entry-info { flex: 1; min-width: 0; }

    .entry-name {
      font-weight: 600;
      font-size: 14px;
      color: #e8f5e9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-cat { font-size: 11px; margin-top: 2px; }

    .entry-amount {
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      margin-right: 12px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .btn-delete {
      background: transparent;
      border: none;
      color: #2a3a2a;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }

    .delete-confirm { display: flex; gap: 4px; }

    .btn-del-yes {
      background: #ef4444;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }

    .btn-del-no {
      background: #1a2a1a;
      border: none;
      color: #aaa;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }

    /* BREAKDOWN */
    .breakdown { padding: 16px; display: none; }
    .breakdown.active { display: block; }

    .cat-row { margin-bottom: 18px; }

    .cat-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .cat-row-left { display: flex; align-items: center; gap: 8px; }
    .cat-emoji { font-size: 20px; }
    .cat-name { font-weight: 600; font-size: 14px; }
    .cat-count { font-size: 11px; color: #4a6a4a; }
    .cat-row-right { text-align: right; }
    .cat-total { font-weight: 800; font-variant-numeric: tabular-nums; }
    .cat-pct { font-size: 11px; }

    .bar-bg { background: #0f1f0f; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* AI */
    .ai-box {
      margin-top: 24px;
      background: #0f1f0f;
      border: 1px solid #1a3a1a;
      border-radius: 14px;
      padding: 16px;
    }

    .btn-ai {
      width: 100%;
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      color: #4ade80;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: inherit;
    }

    .btn-ai:disabled { cursor: default; opacity: 0.7; }

    .ai-note {
      margin-top: 14px;
      color: #a7f3a0;
      font-size: 13px;
      line-height: 1.7;
      display: none;
    }

    /* LOADING */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0f0a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .loading-screen p { color: #4ade80; font-family: monospace; font-size: 13px; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #1a3a1a;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p>Loading from cloud...</p>
</div>

<div class="app" id="app" style="display:none;">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="label">Total Spent</div>
        <div class="total" id="total">0 <span class="currency">PKR</span></div>
        <div class="meta">
          <span class="count" id="count">0 items</span>
          <span class="sync" id="sync"></span>
        </div>
      </div>
      <button class="btn-clear" id="btnClear">CLEAR</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('log')">Log</button>
      <button class="tab inactive" onclick="switchTab('breakdown')">Breakdown</button>
    </div>
  </div>

  <!-- Add expense -->
  <div class="add-btn-wrap" id="addBtnWrap">
    <button class="btn-add-trigger" onclick="openAdd()">+ ADD EXPENSE</button>
  </div>

  <div class="add-panel" id="addPanel">
    <div class="panel-title">+ ADD EXPENSE</div>
    <input class="input-field" id="inputName" placeholder="What did you buy?" />
    <div class="amount-wrap">
      <span class="currency-prefix">PKR</span>
      <input class="input-amount" id="inputAmount" type="number" min="0" placeholder="0" />
    </div>
    <div class="cats" id="catPicker"></div>
    <div class="panel-actions">
      <button class="btn-confirm" onclick="addEntry()">ADD</button>
      <button class="btn-cancel" onclick="closeAdd()">✕</button>
    </div>
  </div>

  <!-- Log view -->
  <div class="log" id="logView"></div>

  <!-- Breakdown view -->
  <div class="breakdown" id="breakdownView">
    <div id="catBars"></div>
    <div class="ai-box">
      <button class="btn-ai" id="btnAi" onclick="getAiInsight()">✨ AI SPENDING INSIGHT</button>
      <div class="ai-note" id="aiNote"></div>
    </div>
  </div>

</div>

<script>
  const FIREBASE_URL = "https://tally-app-8d56f-default-rtdb.firebaseio.com/expenses.json";

  const CATEGORIES = [
    { id: "food",      label: "Food",      emoji: "🍔", color: "#f59e0b" },
    { id: "transport", label: "Transport", emoji: "🚗", color: "#3b82f6" },
    { id: "shopping",  label: "Shopping",  emoji: "🛍️", color: "#8b5cf6" },
    { id: "bills",     label: "Bills",     emoji: "📋", color: "#ef4444" },
    { id: "health",    label: "Health",    emoji: "💊", color: "#10b981" },
    { id: "other",     label: "Other",     emoji: "📦", color: "#6b7280" },
  ];

  let entries = [];
  let selectedCat = "other";
  let currentTab = "log";
  let saveTimer = null;
  let deleteTarget = null;

  // ── Format ──────────────────────────────────────────────
  function fmt(n) {
    return Number(n).toLocaleString("en-PK", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  // ── Sync status ─────────────────────────────────────────
  function setSync(status) {
    const el = document.getElementById("sync");
    el.className = "sync " + status;
    el.textContent = status === "saved" ? "✓ Synced" : status === "syncing" ? "⟳ Saving..." : status === "error" ? "✕ Sync failed" : "";
  }

  // ── Firebase ─────────────────────────────────────────────
  async function loadCloud() {
    const res = await fetch(FIREBASE_URL);
    if (!res.ok) throw new Error("load failed");
    const data = await res.json();
    if (!data) return [];
    return Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
  }

  async function saveCloud() {
    const res = await fetch(FIREBASE_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entries),
    });
    if (!res.ok) throw new Error("save failed");
  }

  function scheduleSave() {
    setSync("syncing");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try { await saveCloud(); setSync("saved"); }
      catch (e) { setSync("error"); }
    }, 800);
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const total = entries.reduce((s, e) => s + e.amount, 0);

    // total
    document.getElementById("total").innerHTML = `${fmt(total)} <span class="currency">PKR</span>`;
    document.getElementById("count").textContent = `${entries.length} item${entries.length !== 1 ? "s" : ""}`;
    document.getElementById("btnClear").style.display = entries.length > 0 ? "block" : "none";

    if (currentTab === "log") renderLog();
    else renderBreakdown(total);
  }

  function renderLog() {
    const logEl = document.getElementById("logView");
    if (entries.length === 0) {
      logEl.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>No expenses yet. Start adding!</p></div>`;
      return;
    }

    // Group by day
    const groups = {};
    entries.forEach(e => {
      const day = new Date(e.date).toLocaleDateString("en-PK", { weekday: "short", month: "short", day: "numeric" });
      if (!groups[day]) groups[day] = [];
      groups[day].push(e);
    });

    logEl.innerHTML = Object.entries(groups).map(([day, items]) => {
      const dayTotal = items.reduce((s, e) => s + e.amount, 0);
      const rows = items.map(e => {
        const cat = CATEGORIES.find(c => c.id === e.cat) || CATEGORIES[5];
        const isDeleting = deleteTarget === e.id;
        return `
          <div class="entry ${isDeleting ? "confirm-delete" : ""}" id="entry-${e.id}">
            <div class="entry-icon" style="background:${cat.color}22">${cat.emoji}</div>
            <div class="entry-info">
              <div class="entry-name">${e.name}</div>
              <div class="entry-cat" style="color:${cat.color}">${cat.label}</div>
            </div>
            <div class="entry-amount">${fmt(e.amount)}</div>
            ${isDeleting
              ? `<div class="delete-confirm">
                   <button class="btn-del-yes" onclick="confirmDelete(${e.id})">Del</button>
                   <button class="btn-del-no" onclick="cancelDelete()">✕</button>
                 </div>`
              : `<button class="btn-delete" onclick="startDelete(${e.id})">🗑</button>`
            }
          </div>`;
      }).join("");
      return `
        <div class="day-header">${day} <span class="day-total">PKR ${fmt(dayTotal)}</span></div>
        ${rows}`;
    }).join("");
  }

  function renderBreakdown(total) {
    const catTotals = CATEGORIES.map(c => ({
      ...c,
      total: entries.filter(e => e.cat === c.id).reduce((s, e) => s + e.amount, 0),
      count: entries.filter(e => e.cat === c.id).length,
    })).filter(c => c.count > 0).sort((a, b) => b.total - a.total);

    const barsEl = document.getElementById("catBars");
    if (catTotals.length === 0) {
      barsEl.innerHTML = `<div class="empty"><p>No data yet.</p></div>`;
      return;
    }

    barsEl.innerHTML = catTotals.map(c => {
      const pct = total > 0 ? (c.total / total) * 100 : 0;
      return `
        <div class="cat-row">
          <div class="cat-row-top">
            <div class="cat-row-left">
              <span class="cat-emoji">${c.emoji}</span>
              <span class="cat-name">${c.label}</span>
              <span class="cat-count">${c.count} item${c.count !== 1 ? "s" : ""}</span>
            </div>
            <div class="cat-row-right">
              <div class="cat-total">PKR ${fmt(c.total)}</div>
              <div class="cat-pct" style="color:${c.color}">${pct.toFixed(1)}%</div>
            </div>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${pct}%;background:${c.color}"></div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Category picker ───────────────────────────────────────
  function buildCatPicker() {
    const el = document.getElementById("catPicker");
    el.innerHTML = CATEGORIES.map(c => `
      <button class="cat-btn ${c.id === selectedCat ? "selected" : ""}"
        id="cat-${c.id}"
        style="${c.id === selectedCat ? `background:${c.color};color:#000` : ""}"
        onclick="selectCat('${c.id}', '${c.color}')">
        ${c.emoji} ${c.label}
      </button>`).join("");
  }

  function selectCat(id, color) {
    selectedCat = id;
    document.querySelectorAll(".cat-btn").forEach(b => {
      b.classList.remove("selected");
      b.style.background = "#111a11";
      b.style.color = "#aaa";
      b.style.fontWeight = "400";
    });
    const btn = document.getElementById("cat-" + id);
    btn.classList.add("selected");
    btn.style.background = color;
    btn.style.color = "#000";
    btn.style.fontWeight = "700";
  }

  // ── Add / Delete ──────────────────────────────────────────
  function openAdd() {
    document.getElementById("addBtnWrap").style.display = "none";
    document.getElementById("addPanel").classList.add("open");
    buildCatPicker();
    document.getElementById("inputName").focus();
  }

  function closeAdd() {
    document.getElementById("addPanel").classList.remove("open");
    document.getElementById("addBtnWrap").style.display = "block";
    document.getElementById("inputName").value = "";
    document.getElementById("inputAmount").value = "";
    selectedCat = "other";
  }

  function addEntry() {
    const name = document.getElementById("inputName").value.trim();
    const amount = parseFloat(document.getElementById("inputAmount").value);
    if (!name || isNaN(amount) || amount <= 0) return;
    entries.unshift({ id: Date.now(), name, amount, cat: selectedCat, date: new Date().toISOString() });
    closeAdd();
    render();
    scheduleSave();
  }

  function startDelete(id) {
    deleteTarget = id;
    render();
  }

  function cancelDelete() {
    deleteTarget = null;
    render();
  }

  function confirmDelete(id) {
    entries = entries.filter(e => e.id !== id);
    deleteTarget = null;
    render();
    scheduleSave();
  }

  // ── Tabs ──────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach((b, i) => {
      const t = i === 0 ? "log" : "breakdown";
      b.className = "tab " + (t === tab ? "active" : "inactive");
    });
    document.getElementById("logView").style.display = tab === "log" ? "block" : "none";
    document.getElementById("breakdownView").className = "breakdown" + (tab === "breakdown" ? " active" : "");
    render();
  }

  // ── Clear ─────────────────────────────────────────────────
  document.getElementById("btnClear").onclick = () => {
    if (confirm("Clear ALL expenses? This can't be undone.")) {
      entries = [];
      document.getElementById("aiNote").style.display = "none";
      render();
      scheduleSave();
    }
  };

  // ── Enter key support ─────────────────────────────────────
  document.getElementById("inputName").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("inputAmount").focus();
  });
  document.getElementById("inputAmount").addEventListener("keydown", e => {
    if (e.key === "Enter") addEntry();
  });

  // ── AI Insight ────────────────────────────────────────────
  async function getAiInsight() {
    if (entries.length === 0) return;
    const btn = document.getElementById("btnAi");
    const noteEl = document.getElementById("aiNote");
    btn.disabled = true;
    btn.textContent = "ANALYZING...";
    noteEl.style.display = "none";

    const total = entries.reduce((s, e) => s + e.amount, 0);
    const catTotals = CATEGORIES.map(c => ({
      ...c,
      total: entries.filter(e => e.cat === c.id).reduce((s, e) => s + e.amount, 0),
      count: entries.filter(e => e.cat === c.id).length,
    })).filter(c => c.count > 0);

    const summary = catTotals.map(c => `${c.label}: PKR ${fmt(c.total)} (${c.count} items)`).join(", ");
    const recent = entries.slice(0, 10).map(e => `${e.name} (${e.cat}) - PKR ${fmt(e.amount)}`).join(", ");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `I'm tracking my expenses. Total spent: PKR ${fmt(total)}. Category breakdown: ${summary}. Recent purchases: ${recent}. Give me a short, direct 2-3 sentence spending insight. Be specific and practical, no fluff. Speak casually.`
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "Couldn't generate insight.";
      noteEl.textContent = text;
      noteEl.style.display = "block";
    } catch (e) {
      noteEl.textContent = "Failed to get AI insight.";
      noteEl.style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "✨ AI SPENDING INSIGHT";
  }

  // ── Init ──────────────────────────────────────────────────
  (async () => {
    setSync("syncing");
    try {
      entries = await loadCloud();
      setSync("saved");
    } catch (e) {
      setSync("error");
    }
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  })();
</script>
